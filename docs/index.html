<!DOCTYPE html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Now Playing on SoundCloud</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <main>
      <header class="site-header">
        <span class="logo">♪</span>
        <h1>Now Playing</h1>
        <p class="subtitle">SoundCloud で再生中の曲と履歴</p>
      </header>

      <section id="now-playing-section" class="now-playing">
        <div class="np-card" id="np-card">
          <div class="np-loading">読み込み中…</div>
        </div>
      </section>

      <section class="history">
        <h2>再生履歴</h2>
        <ul id="history-list" class="history-list"></ul>
      </section>

      <footer class="site-footer">
        <span id="updated-at"></span>
        <span class="dot-sep">·</span>
        <a href="https://github.com" id="repo-link" target="_blank" rel="noopener">GitHub</a>
      </footer>
    </main>
    <script src="app.js"></script>
  </body>
</html>
